<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParolaChat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* O cenário onde os bonecos vão andar */
        #cenario {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #34495e; /* Cor de fundo estilosa */
        }

        /* Estilo do Bonequinho */
        .boneco {
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: #e67e22; /* Laranja Humortadela */
            border-radius: 50%;
            transition: left 0.1s linear, top 0.1s linear;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        /* Olhinhos do boneco para dar carisma */
        .boneco::before {
            content: "👀";
            font-size: 20px;
        }

        /* Balão de fala que fica acima do boneco */
        .balao {
            position: absolute;
            bottom: 60px;
            background-color: white;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            color: black;
            white-space: nowrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: none;
        }

        /* Caixa inferior de envio de mensagens */
        #interface-chat {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 20px;
            z-index: 10;
        }

        #mensagem {
            padding: 8px 15px;
            border-radius: 15px;
            border: none;
            width: 250px;
            outline: none;
        }

        #btn-enviar {
            padding: 8px 15px;
            border-radius: 15px;
            border: none;
            background-color: #2ecc71;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="cenario">
        <!-- Os bonecos dos usuários vão surgir aqui dentro dinamicamente -->
    </div>

    <div id="interface-chat">
        <input type="text" id="mensagem" placeholder="Digite sua mensagem e aperte Enter..." autocomplete="off">
        <button id="btn-enviar" onclick="enviarMensagem()">Falar</button>
    </div>

    <!-- Conexão com o Servidor -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const cenario = document.getElementById('cenario');
        const inputMensagem = document.getElementById('mensagem');

        let meuId = null;
        // Posição inicial do meu boneco
        let minhaPosicao = { x: 200, y: 200 }; 

        // Guarda todos os bonecos conectados na tela
        const usuariosConectados = {};

        // 1. Assim que conectamos, recebemos o nosso ID do servidor
        socket.on('connect', () => {
            meuId = socket.id;
        });

        // 2. Escuta a lista de usuários para desenhar na tela
        socket.on('atualizar_usuarios', (usuarios) => {
            // Remove bonecos que saíram
            Object.keys(usuariosConectados).forEach(id => {
                if (!usuarios[id]) {
                    usuariosConectados[id].remove();
                    delete usuariosConectados[id];
                }
            });

            // Cria ou atualiza a posição dos bonecos
            Object.keys(usuarios).forEach(id => {
                let boneco = usuariosConectados[id];

                if (!boneco) {
                    // Cria o elemento do boneco se ele não existir
                    boneco = document.createElement('div');
                    boneco.className = 'boneco';
                    
                    // Cria o balão de fala grudado nele
                    const balao = document.createElement('div');
                    balao.className = 'balao';
                    boneco.appendChild(balao);

                    cenario.appendChild(boneco);
                    usuariosConectados[id] = boneco;
                }

                // Atualiza a posição visual no cenário
                boneco.style.left = usuarios[id].x + 'px';
                boneco.style.top = usuarios[id].y + 'px';
            });
        });

        // 3. Escuta quando alguém fala algo
        socket.on('usuario_falou', (dados) => {
            const boneco = usuariosConectados[dados.id];
            if (boneco) {
                const balao = boneco.querySelector('.balao');
                balao.innerText = dados.mensagem;
                balao.style.display = 'block';

                // Sumir com o balão depois de 4 segundos
                setTimeout(() => {
                    balao.style.display = 'none';
                }, 4000);
            }
        });

        // 4. Lógica de Envio de Mensagem
        function enviarMensagem() {
            const texto = inputMensagem.value.trim();
            if (texto !== "") {
                socket.emit('enviar_mensagem', texto);
                inputMensagem.value = "";
            }
        }

        // Permitir apertar "Enter" para enviar
        inputMensagem.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                enviarMensagem();
            }
        });

        // 5. MOVIMENTAÇÃO: Escuta as setas do teclado para andar
        window.addEventListener('keydown', (e) => {
            // Se o usuário estiver digitando no input do chat, não move o boneco
            if (document.activeElement === inputMensagem) return;

            const passo = 15; // Quantidade de pixels que anda por clique

            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                minhaPosicao.y -= passo;
            } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
                minhaPosicao.y += passo;
            } else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                minhaPosicao.x -= passo;
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                minhaPosicao.x += passo;
            }

            // Envia a nova posição para o servidor sincronizar com todo mundo
            socket.emit('mover', minhaPosicao);
        });
        // 6. MOVIMENTAÇÃO POR CLIQUE: Escuta o clique do mouse no cenário
        cenario.addEventListener('click', (e) => {
            // Se o usuário clicou na caixinha de texto ou no botão falar, não move o boneco
            if (e.target === inputMensagem || e.target === document.getElementById('btn-enviar')) return;

            // Pega a posição exata onde o mouse clicou na tela
            // Subtraímos 25 para o boneco ficar centralizado bem na ponta da seta do mouse
            minhaPosicao.x = e.clientX - 25;
            minhaPosicao.y = e.clientY - 25;

            // Envia a nova posição para o servidor sincronizar com todo mundo
            socket.emit('mover', minhaPosicao);
        });
    </script>
</body>
</html>
