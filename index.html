<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Humortadela em Tempo Real 🎭</title>
    <style>
        body { background-color: #222; color: white; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #cenario { width: 600px; height: 400px; background-color: #333; border: 4px solid #ffcc00; border-radius: 10px; position: relative; }
        
        .boneco { width: 50px; height: 70px; background-color: #ff5733; border-radius: 10px; position: absolute; bottom: 30px; left: 270px; }
        .boneco::before { content: '👀'; font-size: 20px; position: absolute; top: 5px; left: 13px; }
        
        .balao { position: absolute; background-color: white; color: black; border-radius: 12px; padding: 8px 12px; font-weight: bold; font-size: 14px; bottom: 85px; left: 50%; transform: translateX(-50%); white-space: nowrap; box-shadow: 0px 4px 10px rgba(0,0,0,0.3); display: none; }
        .balao::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); border-width: 8px 8px 0; border-style: solid; border-color: white transparent; }
        
        .controles { margin-top: 20px; }
        input { padding: 10px; font-size: 16px; border-radius: 5px; border: none; width: 300px; }
        button { padding: 10px 15px; font-size: 16px; background-color: #ffcc00; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <h2>Chat Humortadela - Multi-usuário 🎭</h2>

    <div id="cenario">
        <div class="boneco" id="meuBoneco">
            <div class="balao" id="meuBalao"></div>
        </div>
    </div>

    <div class="controles">
        <input type="text" id="mensagem" placeholder="Digite sua mensagem..." maxlength="40">
        <button onclick="enviarMensagem()">Falar</button>
    </div>

    <script>
        // Conecta com o servidor Node.js
        const socket = io();

        // Função executada ao clicar no botão "Falar"
        function enviarMensagem() {
            const input = document.getElementById('mensagem');
            if (input.value.trim() !== "") {
                // Envia o texto para o servidor
                socket.emit('mensagem_enviada', input.value);
                input.value = "";
            }
        }

        // Quando o servidor avisar que alguém enviou mensagem...
        socket.on('mensagem_recebida', (texto) => {
            const balao = document.getElementById('meuBalao');
            balao.innerText = texto;
            balao.style.display = 'block';

            // Some com o balão depois de 4 segundos
            setTimeout(() => {
                balao.style.display = 'none';
            }, 4000);
        });

        // Permitir usar o Enter
        document.getElementById('mensagem').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') enviarMensagem();
        });
    </script>
</body>
</html>
