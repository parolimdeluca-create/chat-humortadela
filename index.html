<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParolaChat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 🚪 TELA DE LOGIN (NICK E COR) */
        #tela-login {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 15px;
        }

        #tela-login h2 { color: white; margin-bottom: 10px; }
        #nick { padding: 10px 15px; border-radius: 8px; border: none; width: 200px; font-size: 16px; outline: none; }
        #cor-boneco { padding: 8px; border-radius: 8px; border: none; font-size: 16px; width: 230px; cursor: pointer; }
        #btn-entrar { padding: 10px 30px; border-radius: 8px; border: none; background-color: #2ecc71; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* 🗺️ CENÁRIO COM LIMITE FIXO */
        #cenario {
            position: relative;
            width: 800px;  
            height: 600px; 
            background-color: #34495e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 4px solid #2c3e50;
            border-radius: 8px;
            overflow: hidden;
        }

        /* 👤 ESTILO DO BONECO */
        .boneco-container {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 80px;
            transition: left 0.1s linear, top 0.1s linear;
        }

        .boneco {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .boneco::before { content: "👀"; font-size: 20px; }

        .nome-usuario {
            color: white;
            font-size: 12px;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            padding: 2px 6px;
            border-radius: 8px;
            margin-top: 5px;
            white-space: nowrap;
        }

        .balao {
            position: absolute;
            bottom: 80px;
            background-color: white;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            color: black;
            white-space: nowrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: none;
            z-index: 5;
        }

        /* 💬 CAIXA DE TEXTO DO CHAT */
        #interface-chat {
            position: fixed;
            bottom: 20px;
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.8);
            padding: 10px 15px;
            border-radius: 20px;
            z-index: 10;
        }

        #mensagem { padding: 8px 15px; border-radius: 15px; border: none; width: 250px; outline: none; }
        #btn-enviar { padding: 8px 15px; border-radius: 15px; border: none; background-color: #e67e22; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <!-- 🚪 Tela inicial de Login -->
    <div id="tela-login">
        <h2>Entrar no ParolaChat</h2>
        <input type="text" id="nick" placeholder="Seu apelido/Nick..." autocomplete="off" maxlength="12">
        <select id="cor-boneco">
            <option value="#e67e22">Laranja Clássico</option>
            <option value="#3498db">Azul Estiloso</option>
            <option value="#2ecc71">Verde Humortadela</option>
            <option value="#9b59b6">Roxo Moderno</option>
            <option value="#e74c3c">Vermelho Fogo</option>
            <option value="#f1c40f">Amarelo Sol</option>
        </select>
        <button id="btn-entrar" onclick="fazerLogin()">Entrar na Sala</button>
    </div>

    <!-- 🗺️ O cenário com tamanho fixo -->
    <div id="cenario"></div>

    <div id="interface-chat">
        <input type="text" id="mensagem" placeholder="Digite sua mensagem e aperte Enter..." autocomplete="off">
        <button id="btn-enviar" onclick="enviarMensagem()">Falar</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const cenario = document.getElementById('cenario');
        const inputMensagem = document.getElementById('mensagem');

        let meuId = null;
        let minhaPosicao = { x: 400, y: 300 }; 
        const usuariosConectados = {};

        // 🚪 FUNÇÃO DE LOGIN
        function fazerLogin() {
            const nickDigitado = document.getElementById('nick').value.trim();
            const corSelecionada = document.getElementById('cor-boneco').value;

            if (nickDigitado === "") {
                alert("Por favor, digite um apelido para entrar!");
                return;
            }

            document.getElementById('tela-login').style.display = 'none';
            inputMensagem.focus();

            socket.emit('entrar_na_sala', { nick: nickDigitado, cor: corSelecionada });
        }

        // Mantém o foco automático na caixinha de texto o tempo todo
        document.addEventListener('click', (e) => {
            if (document.getElementById('tela-login').style.display === 'none' && e.target !== document.getElementById('btn-enviar')) {
                inputMensagem.focus();
            }
        });

        socket.on('connect', () => { meuId = socket.id; });

        socket.on('atualizar_usuarios', (usuarios) => {
            Object.keys(usuariosConectados).forEach(id => {
                if (!usuarios[id] || !usuarios[id].ativo) {
                    usuariosConectados[id].remove();
                    delete usuariosConectados[id];
                }
            });

            Object.keys(usuarios).forEach(id => {
                if (!usuarios[id].ativo) return; 

                let container = usuariosConectados[id];

                if (!container) {
                    container = document.createElement('div');
                    container.className = 'boneco-container';

                    const balao = document.createElement('div');
                    balao.className = 'balao';
                    container.appendChild(balao);

                    const corpoBoneco = document.createElement('div');
                    corpoBoneco.className = 'boneco';
                    corpoBoneco.style.backgroundColor = usuarios[id].cor; 
                    container.appendChild(corpoBoneco);

                    const textoNick = document.createElement('div');
                    textoNick.className = 'nome-usuario';
                    textoNick.innerText = usuarios[id].nick; 
                    container.appendChild(textoNick);

                    cenario.appendChild(container);
                    usuariosConectados[id] = container;
                }

                container.style.left = (usuarios[id].x - 40) + 'px';
                container.style.top = (usuarios[id].y - 25) + 'px';
            });
        });

        socket.on('usuario_falou', (dados) => {
            const container = usuariosConectados[dados.id];
            if (container) {
                const balao = container.querySelector('.balao');
                balao.innerText = dados.mensagem;
                balao.style.display = 'block';
                setTimeout(() => { balao.style.display = 'none'; }, 4000);
            }
        });

        function enviarMensagem() {
            const texto = inputMensagem.value.trim();
            if (texto !== "") {
                socket.emit('enviar_mensagem', texto);
                inputMensagem.value = "";
                inputMensagem.focus();
            }
        }

        inputMensagem.addEventListener('keypress', (e) => { if (e.key === 'Enter') enviarMensagem(); });

        cenario.addEventListener('click', (e) => {
            if (e.target === inputMensagem || e.target === document.getElementById('btn-enviar')) return;

            const retanguloCenario = cenario.getBoundingClientRect();
            let cliqueX = e.clientX - retanguloCenario.left;
            let cliqueY = e.clientY - retanguloCenario.top;

            if (cliqueX < 25) cliqueX = 25;
            if (cliqueX > 775) cliqueX = 775;
            if (cliqueY < 25) cliqueY = 25;
            if (cliqueY > 575) cliqueY = 575;

            minhaPosicao.x = cliqueX;
            minhaPosicao.y = cliqueY;

            socket.emit('mover', minhaPosicao);
        });
    </script>
</body>
</html>
