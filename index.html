<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParolaChat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* O cenário onde os bonecos vão andar */
        #cenario {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #34495e; /* Cor de fundo estilosa */
        }

        /* Estilo do Bonequinho */
        .boneco {
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: #e67e22; /* Laranja Humortadela */
            border-radius: 50%;
            transition: left 0.1s linear, top 0.1s linear;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        /* Olhinhos do boneco para dar carisma */
        .boneco::before {
            content: "👀";
            font-size: 20px;
        }

        /* Balão de fala que fica acima do boneco */
        .balao {
            position: absolute;
            bottom: 60px;
            background-color: white;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            color: black;
            white-space: nowrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: none;
        }

        /* Caixa inferior de envio de mensagens */
        #interface-chat {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 20px;
            z-index: 10;
        }

        #mensagem {
            padding: 8px 15px;
            border-radius: 15px;
            border: none;
            width: 250px;
            outline: none;
        }

        #btn-enviar {
            padding: 8px 15px;
            border-radius: 15px;
            border: none;
            background-color: #2ecc71;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="cenario">
        <!-- Os bonecos dos usuários vão surgir aqui dentro dinamicamente -->
    </div>

    <div id="interface-chat">
        <input type="text" id="mensagem" placeholder="Digite sua mensagem e aperte Enter..." autocomplete="off">
        <button id="btn-enviar" onclick="enviarMensagem()">Falar</button>
    </div>

    <!-- Conexão com o Servidor -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- Conexão com o Servidor -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const cenario = document.getElementById('cenario');
        const inputMensagem = document.getElementById('mensagem');

        let meuId = null;
        let minhaPosicao = { x: 200, y: 200 }; 
        const usuariosConectados = {};

        // 🌟 NOVO: Mantém o foco na caixinha de texto o tempo todo
        // Assim que a página abre, ela já foca na caixinha
        inputMensagem.focus();

        // Se o usuário clicar no cenário, força o foco a voltar para a caixinha na hora
        document.addEventListener('click', (e) => {
            // Só não puxa o foco se ele estiver clicando no botão de falar
            if (e.target !== document.getElementById('btn-enviar')) {
                inputMensagem.focus();
            }
        });

        // 1. Assim que conectamos, recebemos o nosso ID do servidor
        socket.on('connect', () => {
            meuId = socket.id;
        });

        // 2. Escuta a lista de usuários para desenhar na tela
        socket.on('atualizar_usuarios', (usuarios) => {
            Object.keys(usuariosConectados).forEach(id => {
                if (!usuarios[id]) {
                    usuariosConectados[id].remove();
                    delete usuariosConectados[id];
                }
            });

            Object.keys(usuarios).forEach(id => {
                let boneco = usuariosConectados[id];

                if (!boneco) {
                    boneco = document.createElement('div');
                    boneco.className = 'boneco';
                    
                    const balao = document.createElement('div');
                    balao.className = 'balao';
                    boneco.appendChild(balao);

                    cenario.appendChild(boneco);
                    usuariosConectados[id] = boneco;
                }

                boneco.style.left = usuarios[id].x + 'px';
                boneco.style.top = usuarios[id].y + 'px';
            });
        });

        // 3. Escuta quando alguém fala algo
        socket.on('usuario_falou', (dados) => {
            const boneco = usuariosConectados[dados.id];
            if (boneco) {
                const balao = boneco.querySelector('.balao');
                balao.innerText = dados.mensagem;
                balao.style.display = 'block';

                setTimeout(() => {
                    balao.style.display = 'none';
                }, 4000);
            }
        });

        // 4. Lógica de Envio de Mensagem
        function enviarMensagem() {
            const texto = inputMensagem.value.trim();
            if (texto !== "") {
                socket.emit('enviar_mensagem', texto);
                inputMensagem.value = "";
                inputMensagem.focus(); // Garante que continua focado após enviar
            }
        }

        // Permitir apertar "Enter" para enviar
        inputMensagem.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                enviarMensagem();
            }
        });

        // 5. MOVIMENTAÇÃO APENAS POR CLIQUE/TOQUE: Escuta o clique do mouse ou toque na tela
        cenario.addEventListener('click', (e) => {
            // Se clicar nos elementos do chat, não move o boneco
            if (e.target === inputMensagem || e.target === document.getElementById('btn-enviar')) return;

            // Pega a posição do clique (no celular, o toque funciona igual aqui!)
            minhaPosicao.x = e.clientX - 25;
            minhaPosicao.y = e.clientY - 25;

            // Envia para o servidor
            socket.emit('mover', minhaPosicao);
        });
    </script>
</body>
</html>
